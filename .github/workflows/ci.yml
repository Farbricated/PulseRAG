name: PulseRAG CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint & Static Analysis ─────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install flake8 black isort

      - name: Check formatting (black)
        run: black --check --diff backend.py app.py

      - name: Check import order (isort)
        run: isort --check-only backend.py app.py

      - name: Lint (flake8)
        run: flake8 backend.py app.py --max-line-length=120 --ignore=E203,W503

  # ── Job 2: Unit & Integration Tests ───────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backend unit tests
        run: python -m pytest tests/ -v --tb=short
        continue-on-error: false

      - name: Run backend smoke test (no Groq needed)
        run: |
          python -c "
          import backend as bk
          bk.bootstrap()

          # Test embedding
          emb = bk.embed(['gradient descent'])
          assert emb.shape[1] == 384, 'Embedding shape wrong'

          # Test BM25
          docs = bk.bm25_retrieve('gradient descent', 3)
          assert len(docs) > 0, 'BM25 returned nothing'

          # Test feature builder
          feat = bk.build_feature_dict({
              'time_to_read': 30, 'follow_up_asked': 0, 'similar_followup': 0,
              'session_query_count': 1, 'response_length': 400,
              'avg_retrieval_score': 0.7, 'query_complexity': 0.4,
              'hallucination_risk': 0.2, 'response_diversity': 0.6
          })
          assert len(feat) == 12, f'Expected 12 features, got {len(feat)}'
          assert 'quality_weighted_length' in feat

          # Test ML prediction
          pred = bk.predict_understanding(feat)
          assert 0 <= pred['probability'] <= 1
          assert 'threshold' in pred

          # Test RAGAS metrics
          docs2 = bk.hybrid_retrieve('gradient descent', 4)
          ragas = bk.compute_ragas_metrics('gradient descent', 'loss is minimized', docs2)
          assert all(0 <= v <= 1 for v in ragas.values())

          print('All smoke tests passed.')
          "

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            synthetic_data.csv
            pulserag_model.pkl

  # ── Job 3: Docker Build & Validate ────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: pulserag:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate container starts
        run: |
          docker run -d \
            --name pulserag_test \
            -e GROQ_API_KEY=dummy \
            -p 8501:8501 \
            pulserag:${{ github.sha }}
          sleep 15
          docker ps | grep pulserag_test
          docker logs pulserag_test 2>&1 | tail -20
          docker stop pulserag_test

  # ── Job 4: MLflow Experiment Logging ──────────────────────────────────────
  mlflow-log:
    name: Log ML Experiment
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt mlflow

      - name: Train and log experiment
        run: |
          python -c "
          import mlflow, backend as bk
          bk.bootstrap()

          mlflow.set_experiment('pulserag_ci')
          with mlflow.start_run(run_name='ci_build_${{ github.sha }}'):
              df   = bk.generate_synthetic_data(600)
              mets = bk.train_model(df)

              mlflow.log_param('best_model',    mets['best_model'])
              mlflow.log_param('train_size',    mets['train_size'])
              mlflow.log_param('features',      len(mets['features']))
              mlflow.log_metric('roc_auc',      mets['roc_auc'])
              mlflow.log_metric('f1_score',     mets['f1_score'])
              mlflow.log_metric('accuracy',     mets['accuracy'])
              mlflow.log_metric('opt_threshold',mets['opt_threshold'])

              for name, res in mets['cv_results'].items():
                  mlflow.log_metric(f'cv_auc_{name.replace(\" \",\"_\")}', res['mean_auc'])

              mlflow.sklearn.log_model(bk._ml_model, 'model')
              print(f'Logged: AUC={mets[\"roc_auc\"]} F1={mets[\"f1_score\"]} model={mets[\"best_model\"]}')
          "

      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: mlruns/