version: "3.9"

services:
  pulserag:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pulserag_app
    ports:
      - "8501:8501"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PULSERAG_DEVICE=cpu
    volumes:
      # Persist ChromaDB index across container restarts
      - chroma_data:/app/chroma_db
      # Persist SQLite database across container restarts
      - sqlite_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  chroma_data:
    driver: local
  sqlite_data:
    driver: local